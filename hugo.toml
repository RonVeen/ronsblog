baseURL = 'https://ronveen.com/'
languageCode = 'en-us'
title = "Ron's Tech Blog"
theme = 'PaperMod'

[params]
    showCodeCopyButtons = true # Allows readers to copy your Java code easily
    disableSpecial1stPost = true # Make first list item same as others (shows thumbnail)
    ShowPostNavLinks = true      # show next/prev post links
    ShowBreadCrumbs = true       # show breadcrumbs on posts
    ShowReadingTime = true       # show reading time on posts

[taxonomies]
  series = "series"
    # Set to true to replace list summary with reading time (e.g., "3 min read")
    listReplaceSummaryWithReadingTime = true
  category = "categories"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[menu]
  [[menu.main]]
    identifier = "articles"
    name = "Articles"
    url = "/posts/"
    weight = 200
  [[menu.main]]
    identifier = "java"
    name = "Java"
    url = "/categories/java"
    weight = 300
  [[menu.main]]
    identifier = "ai"
    name = "AI"
    url = "/categories/ai"
  weight = 400
  [[menu.main]]
    identifier = "series"
    name = "Series"
    url = "/series/"
    weight = 500
  [[menu.main]]
    identifier = "shorts"
    name = "Shorts"
    url = "/shorts/"
    weight = 600
  [[menu.main]]
    identifier = "books"
    name = "My Books"
    url = "/books/"
    weight = 700
  [[menu.main]]
    identifier = "conference"
    name = "Conferences"
    url = "/conferences/"
    weight = 800
  [[menu.main]]
    identifier = "search"
    name = "Search"
    url = "/search/"
    weight = 900
  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 1000

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.parser]
      attribute = true
  [markup.highlight]
    noClasses = false
    codeFences = true
    guessSyntax = true
    lineNos = true
    style = "monokai" # High-contrast style great for Java
