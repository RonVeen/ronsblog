<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 560" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arrowDown" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 8,4 0,8" fill="#2563eb"/>
    </marker>
    <marker id="arrowUp" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 8,4 0,8" fill="#16a34a"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="430" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">The Advisor Call Chain</text>
  <text x="430" y="56" text-anchor="middle" font-size="13" fill="#64748b">Request flows down (blue), response flows back up (green)</text>

  <!-- Legend -->
  <line x1="250" y1="76" x2="285" y2="76" stroke="#2563eb" stroke-width="2.2" marker-end="url(#arrowDown)"/>
  <text x="292" y="80" font-size="12" fill="#475569">request (adviseCall in)</text>
  <line x1="470" y1="76" x2="505" y2="76" stroke="#16a34a" stroke-width="2.2" marker-end="url(#arrowUp)"/>
  <text x="512" y="80" font-size="12" fill="#475569">response (returns up)</text>

  <!-- Caller box -->
  <rect x="300" y="100" width="260" height="46" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="430" y="122" text-anchor="middle" font-size="14" font-weight="600" fill="#0f172a">ChatClient.prompt()...call()</text>
  <text x="430" y="138" text-anchor="middle" font-size="11" fill="#64748b">your application code</text>

  <!-- Advisor 1: Logging -->
  <rect x="230" y="180" width="400" height="54" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="250" y="203" font-size="13" font-weight="600" fill="#1e3a8a">LoggingAdvisor</text>
  <text x="250" y="221" font-size="11" fill="#64748b">getOrder() = 100 · logs request, then calls chain.nextCall()</text>

  <!-- Advisor 2: Sanitizing -->
  <rect x="230" y="252" width="400" height="54" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="250" y="275" font-size="13" font-weight="600" fill="#1e3a8a">SanitizingAdvisor</text>
  <text x="250" y="293" font-size="11" fill="#64748b">getOrder() = 200 · rewrites ticket text, then calls chain.nextCall()</text>

  <!-- Advisor 3: Guard / Blocking -->
  <rect x="230" y="324" width="400" height="54" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="250" y="347" font-size="13" font-weight="600" fill="#991b1b">GuardAdvisor</text>
  <text x="250" y="365" font-size="11" fill="#64748b">getOrder() = 300 · may block: return a response WITHOUT calling next</text>

  <!-- Tool loop advisor -->
  <rect x="230" y="396" width="400" height="54" rx="8" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="250" y="419" font-size="13" font-weight="600" fill="#5b21b6">ToolCallAdvisor (built-in)</text>
  <text x="250" y="437" font-size="11" fill="#64748b">runs the tool-calling loop · from article 6</text>

  <!-- Model box -->
  <rect x="300" y="484" width="260" height="46" rx="8" fill="#0f172a"/>
  <text x="430" y="506" text-anchor="middle" font-size="14" font-weight="600" fill="#ffffff">Chat Model (the LLM)</text>
  <text x="430" y="522" text-anchor="middle" font-size="11" fill="#94a3b8">final advisor sends the request here</text>

  <!-- Down arrows (request path), left side -->
  <line x1="360" y1="146" x2="360" y2="179" stroke="#2563eb" stroke-width="2.2" marker-end="url(#arrowDown)"/>
  <line x1="360" y1="234" x2="360" y2="251" stroke="#2563eb" stroke-width="2.2" marker-end="url(#arrowDown)"/>
  <line x1="360" y1="306" x2="360" y2="323" stroke="#2563eb" stroke-width="2.2" marker-end="url(#arrowDown)"/>
  <line x1="360" y1="378" x2="360" y2="395" stroke="#2563eb" stroke-width="2.2" marker-end="url(#arrowDown)"/>
  <line x1="360" y1="450" x2="360" y2="483" stroke="#2563eb" stroke-width="2.2" marker-end="url(#arrowDown)"/>

  <!-- Up arrows (response path), right side -->
  <line x1="500" y1="483" x2="500" y2="451" stroke="#16a34a" stroke-width="2.2" marker-end="url(#arrowUp)"/>
  <line x1="500" y1="395" x2="500" y2="379" stroke="#16a34a" stroke-width="2.2" marker-end="url(#arrowUp)"/>
  <line x1="500" y1="323" x2="500" y2="307" stroke="#16a34a" stroke-width="2.2" marker-end="url(#arrowUp)"/>
  <line x1="500" y1="251" x2="500" y2="235" stroke="#16a34a" stroke-width="2.2" marker-end="url(#arrowUp)"/>
  <line x1="500" y1="179" x2="500" y2="147" stroke="#16a34a" stroke-width="2.2" marker-end="url(#arrowUp)"/>

  <!-- Block short-circuit arrow -->
  <path d="M620 351 Q 700 351 700 300 Q 700 169 512 169" fill="none" stroke="#dc2626" stroke-width="1.8" stroke-dasharray="5 4" marker-end="url(#arrowUp)"/>
  <text x="712" y="262" font-size="11" fill="#dc2626" font-weight="600">block:</text>
  <text x="712" y="277" font-size="11" fill="#dc2626">short-circuit</text>
  <text x="712" y="292" font-size="11" fill="#dc2626">response up</text>

  <!-- Order note -->
  <text x="145" y="207" text-anchor="middle" font-size="11" fill="#94a3b8" transform="rotate(-90 145 300)">lower getOrder() runs first  ·  request travels down</text>
</svg>
